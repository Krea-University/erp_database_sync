# =============================================================================
#  docker-compose.yml  –  Local MySQL only
#  Values sourced from .env in the same directory
# =============================================================================

volumes:
  mysql_data:
    name: erp_mysql_data

services:

  mysql_local:
    image: mysql:8.0
    container_name: mysql_local
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --sha256-password-auto-generate-rsa-keys=OFF
    ports:
      - "${MYSQL_LOCAL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro
      - ./conf/my.cnf:/etc/mysql/conf.d/local.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout:  5s
      retries:  10
      start_period: 30s
